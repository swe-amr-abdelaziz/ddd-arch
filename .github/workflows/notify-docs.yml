name: notify-docs

on:
  push:
    branches: [main]
    paths:
      - 'packages/eslint-plugin/docs/rules/**'

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger the docs site to sync and deploy
        run: |
          curl -sfL -X POST \
            -H "Authorization: Bearer ${{ secrets.DOCS_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/archward/docs/dispatches \
            -d '{"event_type":"upstream-rules"}'
